<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Miti: Pharmacy Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <header>
        <h1 data-i18n="login_page_h1">Pharmacy Login</h1>
        <nav>
            <ul>
                <li><a href="index.html" data-i18n="nav_home">Home</a></li>
                <li><a href="search.html" data-i18n="nav_search">Search</a></li>
                <li><a href="pharegister.html" data-i18n="nav_register">Register Pharmacy</a></li>
                <li><button id="lang-toggle" onclick="toggleLanguage()">Kirundi</button></li>
            </ul>
        </nav>
    </header>

    <section id="login">
        <h2 data-i18n="login_section_heading">Login to Your Pharmacy Account</h2>
        <form action="/login_pharmacy" method="post">
            <label for="certificate" data-i18n="login_label_certificate">License Certificate Number:</label>
            <input type="text" id="certificate" name="certificate" required>

            <button type="submit" data-i18n="login_btn">Login</button>
        </form>
    </section>

    <footer>
        <p data-i18n="footer_copyright">&copy; 2024 I-Miti. All rights reserved.</p>
    </footer>

    <script src="/scripts/translations.js"></script>
    <script src="/scripts/login.js" defer></script>
</body>
</html>
