<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Miti: Pharmacy Register</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <header>
        <h1 data-i18n="register_page_h1">Pharmacy Registration</h1>
        <nav>
            <ul>
                <li><a href="index.html" data-i18n="nav_home">Home</a></li>
                <li><a href="search.html" data-i18n="nav_search">Search</a></li>
                <li><a href="pharegister.html" data-i18n="nav_register">Register Pharmacy</a></li>
                <li><button id="lang-toggle" onclick="toggleLanguage()">Kirundi</button></li>
            </ul>
        </nav>
    </header>

    <section id="register">
        <h2 data-i18n="register_section_heading">Register Your Pharmacy</h2>
        <div style="background-color: #34495e; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #3498db;">
            <p style="margin: 0; color: #ecf0f1;">
                <strong data-i18n="register_verified_badge">Verification Complete:</strong>
                <span data-i18n="register_verified_body">You have successfully verified your pharmacy credentials. Please complete your registration below.</span>
            </p>
        </div>
        <form action="/register_pharmacy" method="post">
            <label for="name" data-i18n="register_label_name">Pharmacy Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="address" data-i18n="register_label_address">Address:</label>
            <input type="text" id="address" name="address" required>

            <label for="phone" data-i18n="register_label_phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="certificate" data-i18n="register_label_certificate">License Certificate Number:</label>
            <input type="text" id="certificate" name="certificate" required>

            <label for="latitude" data-i18n="register_label_latitude">Latitude:</label>
            <input type="text" id="latitude" name="latitude" required>

            <label for="longitude" data-i18n="register_label_longitude">Longitude:</label>
            <input type="text" id="longitude" name="longitude" required>

            <button type="submit" data-i18n="register_btn">Register</button>
        </form>
    </section>

    <footer>
        <p data-i18n="footer_copyright">&copy; 2024 I-Miti. All rights reserved.</p>
    </footer>

    <script src="/scripts/translations.js"></script>
    <script src="/scripts/register.js" defer></script>
</body>
</html>
